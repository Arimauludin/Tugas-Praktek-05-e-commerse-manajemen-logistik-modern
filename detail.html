<div class="container py-5">
    <div class="row bg-white p-4 rounded shadow-sm">
        <div class="col-md-6 text-center"><img src="{{ p.img }}" class="img-fluid rounded" style="max-height:400px;"></div>
        <div class="col-md-6">
            <h2>{{ p.nama }}</h2>
            <h3 class="text-danger">Rp{{ "{:,.0f}".format(p.harga).replace(',', '.') }}</h3>
            <p class="text-muted">Stok: {{ p.stok }}</p>
            <p class="fw-bold">Kemasan</p>
            <div class="btn-group mb-3">
                <button class="btn btn-outline-secondary">100g</button>
                <button class="btn btn-outline-danger active">200g</button>
            </div>
            <p class="fw-bold">Gilingan</p>
            <div class="btn-group mb-4">
                <button class="btn btn-outline-secondary">Biji Kopi</button>
                <button class="btn btn-outline-secondary">Halus</button>
            </div>
            <a href="/" class="btn btn-danger w-100">Beli Sekarang</a>
        </div>
    </div>
</div>
<div class="container py-4">
    <div class="row bg-white p-4 rounded shadow-sm">
        <div class="col-md-6"><img src="{{ p.img }}" class="img-fluid rounded"></div>
        <div class="col-md-6">
            <h2>{{ p.nama }}</h2>
            <h3 class="text-danger">Rp{{ "{:,.0f}".format(p.harga).replace(',', '.') }}</h3>
            
            <p class="mt-4 fw-bold">Kemasan</p>
            <div class="btn-group">
                <button class="btn btn-outline-secondary">100g</button>
                <button class="btn btn-outline-danger active">200g</button>
                <button class="btn btn-outline-secondary">500g</button>
            </div>

            <p class="mt-3 fw-bold">Gilingan</p>
            <div class="btn-group">
                <button class="btn btn-outline-secondary">Biji Kopi</button>
                <button class="btn btn-outline-secondary">Halus</button>
            </div>

            <form method="POST" action="/">
                <input type="hidden" name="add_to_cart" value="1">
                <input type="hidden" name="product_id" value="{{ p.id }}">
                <button type="submit" class="btn btn-danger w-100 mt-4 py-2 fw-bold">Beli Sekarang</button>
            </form>
        </div>
    </div>
</div>
