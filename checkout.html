<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Ari Logistics Midnight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-dark: #c8cdd9;
            --card-dark: #d9dfe8;
            --accent-neon: #38bdf8;
            --text-main: #f1f5f9;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
        }

        .checkout-card { 
            background-color: var(--card-dark);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }

        .payment-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        .payment-option:hover {
            border-color: var(--accent-neon);
            background: rgba(231, 234, 235, 0.779);
        }

        .form-check-input:checked + .form-check-label {
            color: var(--accent-neon);
            font-weight: bold;
        }

        .btn-order { 
            background-color: var(--accent-neon); 
            color: #c9cfdc;
            border: none; 
            font-weight: 800; 
            padding: 15px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-order:hover { 
            background-color: #0ea5e9;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
        
        .text-muted { color: #94a3b8 !important; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="d-flex align-items-center mb-4">
                <a href="/" class="text-info me-3"><i class="bi bi-arrow-left fs-4"></i></a>
                <h4 class="fw-bold m-0">Konfirmasi Pesanan</h4>
            </div>

            <div class="card checkout-card mb-4">
                <div class="card-body p-4">
                    <h6 class="text-info fw-bold mb-3"><i class="bi bi-geo-alt-fill me-2"></i>Alamat Pengiriman</h6>
                    <p class="mb-1 fw-bold">Hasbi Baihaki</p>
                    <p class="mb-1 small">(+62) 838-2119-5705</p>
                    <p class="text-muted small mb-0">Majalaya, Bandung, Jawa Barat</p>
                </div>
            </div>

            <div class="card checkout-card">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-4">Metode Pembayaran</h6>
                    
                    <form action="/proses_pesanan" method="POST">
                        <div class="form-check payment-option p-3 rounded-3 mb-3">
                            <input class="form-check-input ms-0 me-3" type="radio" name="payment_method" id="tf_bank" value="Transfer Bank" checked>
                            <label class="form-check-label d-flex justify-content-between w-100" for="tf_bank">
                                <span><i class="bi bi-bank me-2"></i> Transfer Bank</span>
                                <small class="text-muted">BCA / Mandiri</small>
                            </label>
                        </div>

                        <div class="form-check payment-option p-3 rounded-3 mb-3">
                            <input class="form-check-input ms-0 me-3" type="radio" name="payment_method" id="e_wallet" value="E-Wallet">
                            <label class="form-check-label d-flex justify-content-between w-100" for="e_wallet">
                                <span><i class="bi bi-phone me-2"></i> E-Wallet</span>
                                <span class="badge bg-info text-dark small">Instan</span>
                            </label>
                        </div>

                        <div class="form-check payment-option p-3 rounded-3 mb-4">
                            <input class="form-check-input ms-0 me-3" type="radio" name="payment_method" id="cod" value="COD">
                            <label class="form-check-label w-100" for="cod">
                                <i class="bi bi-truck me-2"></i> Bayar di Tempat (COD)
                            </label>
                        </div>

                        <div class="d-flex justify-content-between mb-2 small">
                            <span class="text-muted">Biaya Layanan</span>
                            <span>Rp{{ "{:,.0f}".format(layanan).replace(',', '.') }}</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold">Total Pembayaran</span>
                            <h5 class="fw-bold text-info">Rp{{ "{:,.0f}".format(total).replace(',', '.') }}</h5>
                        </div>

                        <button type="submit" class="btn btn-order w-100 shadow">
                            Buat Pesanan Sekarang
                        </button>
                    </form>
                    
                    <a href="/" class="btn btn-link w-100 mt-3 text-decoration-none text-muted small">
                        <i class="bi bi-cart me-1"></i> Kembali Belanja
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
