<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Logistics System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .register-container { max-width: 450px; margin: 80px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #005088; border: none; }
        .btn-primary:hover { background-color: #003d66; }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-container">
            <h3 class="text-center mb-4">Daftar Akun Logistik</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Masukkan username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Role Pengguna</label>
                    <select name="role" class="form-select">
                        <option value="Buyer">Pembeli (Buyer)</option>
                        <option value="Logistics">Pihak Logistik (Courier/Warehouse)</option>
                        <option value="Seller">Penjual (Seller)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Minimal 8 karakter" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Daftar Sekarang</button>
                <p class="text-center mt-3">Sudah punya akun? <a href="#">Login di sini</a></p>
            </form>
        </div>
    </div>
</body>
</html>
